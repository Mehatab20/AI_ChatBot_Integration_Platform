spring.application.name=ai_chatbot_integration_platform

jwt.secret=MySecretKeyForJwtAuthentication12345678901234567890
jwt.expiration=86400000

# Server Port
server.port=8080

# MySQL Database Connection URL 
spring.datasource.url=jdbc:mysql://localhost:3306/ai_chatbot_integration_platform?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect